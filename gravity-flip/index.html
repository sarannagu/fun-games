<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🚀 Gravity Flip Runner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    user-select: none;
  }
  canvas { display: block; touch-action: none; }
  #ui {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 16px 24px;
    pointer-events: none;
    z-index: 10;
  }
  .ui-box {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 6px 16px;
    color: white;
    font-size: 0.9rem;
    font-weight: 700;
    backdrop-filter: blur(4px);
  }
  .ui-box span { color: #7DF9FF; font-size: 1.1rem; }
  #back-btn {
    position: fixed;
    bottom: 16px; left: 16px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    color: white;
    font-size: 0.85rem;
    font-weight: 700;
    padding: 7px 14px;
    cursor: pointer;
    z-index: 20;
    text-decoration: none;
    backdrop-filter: blur(4px);
  }
  #back-btn:hover { background: rgba(255,255,255,0.2); }
</style>
</head>
<body>

<div id="ui">
  <div class="ui-box">Score <span id="score-display">0</span></div>
  <div class="ui-box">Best <span id="best-display">0</span></div>
  <div class="ui-box">Speed <span id="speed-display">1x</span></div>
</div>

<canvas id="c"></canvas>
<a href="../" id="back-btn">← All Games</a>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── Resize ──────────────────────────────────────────────────────────────────
let W, H;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Constants ────────────────────────────────────────────────────────────────
const PLAYER_X     = 120;
const PLAYER_SIZE  = 28;
const GRAVITY      = 0.55;
const FLIP_VEL     = -12;
const FLOOR_MARGIN = 56;   // gap between spikes and edge
const SPIKE_W      = 22;
const SPIKE_H      = 28;
const STAR_COUNT   = 180;

// ── State ────────────────────────────────────────────────────────────────────
let state = 'menu';   // menu | playing | dead
let score, best, speed, gravDir, vy, playerY;
let obstacles, particles, stars, shakeAmt;
let spawnTimer, spawnInterval;
let tilt, tiltTarget, tiltVel;
let bgHue, bgHueTarget;
let lastTime, dt;
let phase;            // current difficulty phase

function init() {
  score         = 0;
  speed         = 5;
  gravDir       = 1;     // 1 = floor, -1 = ceiling
  vy            = 0;
  playerY       = H / 2;
  obstacles     = [];
  particles     = [];
  shakeAmt      = 0;
  spawnTimer    = 0;
  spawnInterval = 90;
  tilt          = 0;
  tiltTarget    = 0;
  tiltVel       = 0;
  bgHue         = 220;
  bgHueTarget   = 220;
  phase         = 0;
  lastTime      = null;
}

// ── Stars ────────────────────────────────────────────────────────────────────
stars = Array.from({ length: STAR_COUNT }, () => ({
  x: Math.random() * 4000,
  y: Math.random(),
  r: 0.4 + Math.random() * 1.8,
  speed: 0.15 + Math.random() * 0.7,
  alpha: 0.3 + Math.random() * 0.7,
  twinkleSpeed: 0.5 + Math.random() * 2,
  twinkleOffset: Math.random() * Math.PI * 2,
}));
let starOffset = 0;

// ── Nebulae ───────────────────────────────────────────────────────────────────
const NEBULA_COLORS = [260, 200, 320, 180, 30];
const nebulae = Array.from({ length: 6 }, (_, i) => ({
  x: Math.random() * 5000,
  y: 0.1 + Math.random() * 0.8,
  r: 120 + Math.random() * 200,
  hue: NEBULA_COLORS[i % NEBULA_COLORS.length] + (Math.random()-0.5)*30,
  alpha: 0.05 + Math.random() * 0.07,
  speed: 0.03 + Math.random() * 0.06,
}));

// ── Planets ───────────────────────────────────────────────────────────────────
const PLANET_TYPES = [
  { hue:15,  sat:70, lit:42, hasRing:false, name:'mars'    },
  { hue:200, sat:65, lit:48, hasRing:false, name:'neptune' },
  { hue:35,  sat:80, lit:55, hasRing:true,  name:'saturn'  },
  { hue:280, sat:55, lit:42, hasRing:false, name:'purple'  },
  { hue:155, sat:60, lit:38, hasRing:false, name:'teal'    },
  { hue:50,  sat:75, lit:52, hasRing:true,  name:'jupiter' },
  { hue:0,   sat:0,  lit:75, hasRing:false, name:'moon'    },
  { hue:220, sat:50, lit:35, hasRing:false, name:'ice'     },
];
const planets = Array.from({ length: 10 }, () => {
  const t = PLANET_TYPES[Math.floor(Math.random() * PLANET_TYPES.length)];
  return {
    x:          Math.random() * 9000,
    y:          0.18 + Math.random() * 0.64,
    r:          18 + Math.random() * 52,
    hue:        t.hue + (Math.random()-0.5)*15,
    sat:        t.sat,
    lit:        t.lit,
    hasRing:    t.hasRing,
    ringTilt:   0.15 + Math.random() * 0.35,
    speed:      0.05 + Math.random() * 0.14,
    hasMoon:    Math.random() < 0.35,
    moonPhase:  Math.random() * Math.PI * 2,
    moonDist:   1.7 + Math.random() * 0.7,
    moonSize:   0.18 + Math.random() * 0.12,
    stripes:    t.name === 'jupiter' || t.name === 'saturn',
  };
});

// ── Best score ───────────────────────────────────────────────────────────────
best = parseInt(localStorage.getItem('gfr_best') || '0');
document.getElementById('best-display').textContent = best;

// ── Input ────────────────────────────────────────────────────────────────────
function flip() {
  if (state === 'menu' || state === 'dead') {
    init();
    state = 'playing';
    return;
  }
  if (state === 'playing') {
    gravDir = -gravDir;
    vy = FLIP_VEL * gravDir;
    spawnParticles(PLAYER_X + PLAYER_SIZE/2, playerY + PLAYER_SIZE/2, 8, '#7DF9FF');
  }
}

document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); flip(); } });
canvas.addEventListener('pointerdown', e => { e.preventDefault(); flip(); });

// ── Obstacle factory ─────────────────────────────────────────────────────────
function makeObstacle() {
  const type = pickObstacleType();
  const x = W + 60;

  if (type === 'floor') return { x, type:'floor', h: SPIKE_H + Math.random()*16 };
  if (type === 'ceil')  return { x, type:'ceil',  h: SPIKE_H + Math.random()*16 };
  if (type === 'both')  return { x, type:'both',  hf: SPIKE_H, hc: SPIKE_H };
  if (type === 'gap')   return { x, type:'gap',   h: SPIKE_H+8, onCeil: Math.random()<0.5 };
  return { x, type:'floor', h: SPIKE_H };
}

function pickObstacleType() {
  if (phase === 0) return Math.random() < 0.7 ? 'floor' : 'ceil';
  if (phase === 1) return ['floor','ceil','both'][Math.floor(Math.random()*3)];
  return ['floor','ceil','both','gap'][Math.floor(Math.random()*4)];
}

// ── Particles ────────────────────────────────────────────────────────────────
function spawnParticles(x, y, n, color) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const v = 1 + Math.random() * 4;
    particles.push({ x, y, vx: Math.cos(a)*v, vy: Math.sin(a)*v, life: 1, color, size: 2+Math.random()*4 });
  }
}

// ── Main loop (single loop, never stops) ─────────────────────────────────────
function tick(ts) {
  requestAnimationFrame(tick);
  try {
    if (state === 'playing') {
      dt = lastTime ? Math.min((ts - lastTime) / 16.67, 3) : 1;
      lastTime = ts;
      update();
      draw(ts);
    } else if (state === 'menu') {
      drawMenu(ts);
    } else if (state === 'dead') {
      draw(ts);
      drawDeadOverlay(ts);
    }
  } catch(e) {
    console.error('Game error:', e);
  }
}

// ── Update ───────────────────────────────────────────────────────────────────
function update() {
  score += dt * 0.5;
  document.getElementById('score-display').textContent = Math.floor(score);

  // Phase thresholds
  const newPhase = score < 200 ? 0 : score < 600 ? 1 : 2;
  if (newPhase !== phase) {
    phase = newPhase;
    spawnParticles(W/2, H/2, 30, '#FFD700');
  }

  // Speed ramp
  speed = 5 + Math.floor(score / 100) * 0.4;
  speed = Math.min(speed, 14);
  document.getElementById('speed-display').textContent = (speed / 5).toFixed(1) + 'x';

  // Tilt effect (phase 2+)
  if (phase >= 2) {
    if (Math.random() < 0.005) tiltTarget = (Math.random() - 0.5) * 10;
  } else {
    tiltTarget = 0;
  }
  tiltVel += (tiltTarget - tilt) * 0.04;
  tiltVel *= 0.85;
  tilt += tiltVel * dt;

  // BG hue shift
  bgHueTarget = 220 + phase * 60 + Math.sin(score * 0.005) * 20;
  bgHue += (bgHueTarget - bgHue) * 0.01;

  // Gravity
  vy += GRAVITY * gravDir * dt;
  vy = Math.max(-18, Math.min(18, vy));
  playerY += vy * dt;

  // Clamp to play area
  const floorY = H - FLOOR_MARGIN - PLAYER_SIZE;
  const ceilY  = FLOOR_MARGIN;
  if (playerY > floorY) { playerY = floorY; vy = 0; }
  if (playerY < ceilY)  { playerY = ceilY;  vy = 0; }

  // Spawn obstacles
  spawnTimer += dt;
  spawnInterval = Math.max(38, 90 - phase * 12 - speed * 2);
  if (spawnTimer >= spawnInterval) { spawnTimer = 0; obstacles.push(makeObstacle()); }

  // Move obstacles
  obstacles.forEach(o => o.x -= speed * dt);
  obstacles = obstacles.filter(o => o.x > -80);

  // Stars parallax
  starOffset += speed * 0.3 * dt;

  // Particles
  particles.forEach(p => { p.x += p.vx * dt; p.y += p.vy * dt; p.life -= 0.03 * dt; });
  particles = particles.filter(p => p.life > 0);

  // Screen shake decay
  shakeAmt *= 0.8;

  // Collision
  if (checkCollision()) die();
}

// ── Collision ─────────────────────────────────────────────────────────────────
function checkCollision() {
  const px = PLAYER_X + 4, py = playerY + 4;
  const pw = PLAYER_SIZE - 8, ph = PLAYER_SIZE - 8;

  for (const o of obstacles) {
    if (o.type === 'floor' || o.type === 'both') {
      const sx = o.x, sy = H - FLOOR_MARGIN - o.h;
      if (rectsOverlap(px,py,pw,ph, sx, sy, SPIKE_W, o.h)) return true;
    }
    if (o.type === 'ceil' || o.type === 'both') {
      const h2 = o.type === 'both' ? o.hc : o.h;
      const sx = o.x, sy = FLOOR_MARGIN;
      if (rectsOverlap(px,py,pw,ph, sx, sy, SPIKE_W, h2)) return true;
    }
    if (o.type === 'gap') {
      const sy = o.onCeil ? FLOOR_MARGIN : H - FLOOR_MARGIN - o.h;
      if (rectsOverlap(px,py,pw,ph, o.x, sy, SPIKE_W, o.h)) return true;
    }
  }
  return false;
}

function rectsOverlap(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

// ── Die ───────────────────────────────────────────────────────────────────────
function die() {
  state = 'dead';
  drawDeadOverlay.startTs = null;
  shakeAmt = 18;
  spawnParticles(PLAYER_X + PLAYER_SIZE/2, playerY + PLAYER_SIZE/2, 40, '#FF4444');
  spawnParticles(PLAYER_X + PLAYER_SIZE/2, playerY + PLAYER_SIZE/2, 20, '#FFD700');
  if (score > best) {
    best = Math.floor(score);
    localStorage.setItem('gfr_best', best);
    document.getElementById('best-display').textContent = best;
  }
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function draw(ts) {
  const sx = shakeAmt ? (Math.random()-0.5)*shakeAmt : 0;
  const sy = shakeAmt ? (Math.random()-0.5)*shakeAmt : 0;

  ctx.save();
  ctx.translate(sx, sy);

  if (tilt !== 0) {
    ctx.translate(W/2, H/2);
    ctx.rotate(tilt * Math.PI / 180);
    ctx.translate(-W/2, -H/2);
  }

  drawBg();
  drawNebulae(ts || 0);
  drawStars(ts || 0);
  drawPlanets();
  drawLanes();
  drawObstacles();
  drawPlayer();
  drawParticles();

  ctx.restore();
}

function drawBg() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0,   `hsl(${bgHue},65%,4%)`);
  grad.addColorStop(0.5, `hsl(${bgHue+20},55%,7%)`);
  grad.addColorStop(1,   `hsl(${bgHue+45},50%,10%)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawNebulae(ts) {
  nebulae.forEach(n => {
    const range = W * 3;
    const x = ((n.x - starOffset * n.speed) % range + range) % range - W * 0.3;
    const y = n.y * H;
    if (x < -n.r * 2 || x > W + n.r * 2) return;
    const g = ctx.createRadialGradient(x, y, 0, x, y, n.r);
    g.addColorStop(0,   `hsla(${n.hue},80%,65%,${n.alpha * 1.8})`);
    g.addColorStop(0.4, `hsla(${n.hue+20},70%,50%,${n.alpha})`);
    g.addColorStop(1,   `hsla(${n.hue},60%,40%,0)`);
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(x, y, n.r, n.r * 0.6, 0, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.restore();
  });
}

function drawStars(ts) {
  stars.forEach(s => {
    const x = ((s.x - starOffset * s.speed) % W + W) % W;
    const y = s.y * H;
    const twinkle = 0.5 + 0.5 * Math.sin(ts * 0.001 * s.twinkleSpeed + s.twinkleOffset);
    const a = s.alpha * (0.6 + 0.4 * twinkle);
    const r = s.r * (0.85 + 0.15 * twinkle);
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.fill();
  });
}

function drawPlanets() {
  planets.forEach(p => {
    const range = W + p.r * 6;
    const rawX = (p.x - starOffset * p.speed) % range;
    const x = ((rawX % range) + range) % range - p.r * 2;
    const y = p.y * H;
    if (x < -p.r * 3 || x > W + p.r * 3) return;

    ctx.save();

    // Glow halo
    ctx.shadowBlur  = p.r * 1.2;
    ctx.shadowColor = `hsla(${p.hue},${p.sat}%,${p.lit + 20}%,0.25)`;

    // Planet body — radial gradient for 3D sphere look
    const grad = ctx.createRadialGradient(
      x - p.r * 0.3, y - p.r * 0.35, p.r * 0.05,
      x, y, p.r
    );
    grad.addColorStop(0,   `hsl(${p.hue},${p.sat}%,${p.lit + 28}%)`);
    grad.addColorStop(0.45,`hsl(${p.hue},${p.sat}%,${p.lit}%)`);
    grad.addColorStop(0.8, `hsl(${p.hue - 10},${p.sat - 10}%,${p.lit - 18}%)`);
    grad.addColorStop(1,   `hsl(${p.hue - 15},${p.sat - 20}%,${p.lit - 30}%)`);
    ctx.beginPath();
    ctx.arc(x, y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Jupiter-style horizontal stripes
    if (p.stripes) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(x, y, p.r, 0, Math.PI * 2);
      ctx.clip();
      ctx.globalAlpha = 0.18;
      for (let i = -3; i <= 3; i++) {
        ctx.fillStyle = i % 2 === 0
          ? `hsl(${p.hue + 30},60%,70%)`
          : `hsl(${p.hue - 10},40%,25%)`;
        ctx.fillRect(x - p.r, y + i * p.r * 0.3 - p.r * 0.15, p.r * 2, p.r * 0.3);
      }
      ctx.restore();
    }

    // Dark-side shadow overlay
    ctx.save();
    ctx.beginPath();
    ctx.arc(x, y, p.r, 0, Math.PI * 2);
    ctx.clip();
    const shadow = ctx.createRadialGradient(
      x + p.r * 0.5, y + p.r * 0.3, p.r * 0.3,
      x + p.r * 0.6, y + p.r * 0.4, p.r * 1.1
    );
    shadow.addColorStop(0, 'transparent');
    shadow.addColorStop(1, 'rgba(0,0,0,0.55)');
    ctx.fillStyle = shadow;
    ctx.fillRect(x - p.r, y - p.r, p.r * 2, p.r * 2);
    ctx.restore();

    // Saturn-style ring (drawn behind planet for back half, front for front half)
    if (p.hasRing) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(1, p.ringTilt);
      ctx.shadowBlur = 0;
      // back half of ring (drawn first, behind planet)
      ctx.strokeStyle = `hsla(${p.hue + 25},70%,${p.lit + 25}%,0.55)`;
      ctx.lineWidth = p.r * 0.22;
      ctx.beginPath();
      ctx.arc(0, 0, p.r * 1.65, Math.PI, Math.PI * 2);
      ctx.stroke();
      ctx.strokeStyle = `hsla(${p.hue + 15},60%,${p.lit + 15}%,0.3)`;
      ctx.lineWidth = p.r * 0.1;
      ctx.beginPath();
      ctx.arc(0, 0, p.r * 1.95, Math.PI, Math.PI * 2);
      ctx.stroke();
      ctx.restore();

      // Draw planet again (to cover back ring)
      ctx.beginPath();
      ctx.arc(x, y, p.r - 1, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      // Front half of ring (over planet)
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(1, p.ringTilt);
      ctx.shadowBlur = 0;
      ctx.strokeStyle = `hsla(${p.hue + 25},70%,${p.lit + 25}%,0.55)`;
      ctx.lineWidth = p.r * 0.22;
      ctx.beginPath();
      ctx.arc(0, 0, p.r * 1.65, 0, Math.PI);
      ctx.stroke();
      ctx.restore();
    }

    // Moon
    if (p.hasMoon) {
      const angle = p.moonPhase + starOffset * 0.0015;
      const mx = x + Math.cos(angle) * p.r * p.moonDist;
      const my = y + Math.sin(angle) * p.r * p.moonDist * 0.55;
      const mr = p.r * p.moonSize;
      ctx.shadowBlur = mr * 2; ctx.shadowColor = 'rgba(200,220,255,0.4)';
      const mg = ctx.createRadialGradient(mx - mr*0.3, my - mr*0.3, mr*0.05, mx, my, mr);
      mg.addColorStop(0, `hsl(${p.hue+40},25%,80%)`);
      mg.addColorStop(1, `hsl(${p.hue+20},20%,45%)`);
      ctx.beginPath();
      ctx.arc(mx, my, mr, 0, Math.PI * 2);
      ctx.fillStyle = mg;
      ctx.fill();
    }

    ctx.restore();
  });
}

function drawLanes() {
  // Floor platform
  const floorGrad = ctx.createLinearGradient(0, H - FLOOR_MARGIN, 0, H);
  floorGrad.addColorStop(0, `hsl(${bgHue+20},70%,25%)`);
  floorGrad.addColorStop(1, `hsl(${bgHue+20},60%,15%)`);
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, H - FLOOR_MARGIN, W, FLOOR_MARGIN);

  // Ceiling platform
  const ceilGrad = ctx.createLinearGradient(0, 0, 0, FLOOR_MARGIN);
  ceilGrad.addColorStop(0, `hsl(${bgHue+20},60%,15%)`);
  ceilGrad.addColorStop(1, `hsl(${bgHue+20},70%,25%)`);
  ctx.fillStyle = ceilGrad;
  ctx.fillRect(0, 0, W, FLOOR_MARGIN);

  // Glow lines
  ctx.save();
  ctx.shadowBlur = 12;
  ctx.shadowColor = `hsl(${bgHue+40},100%,60%)`;
  ctx.fillStyle   = `hsl(${bgHue+40},100%,70%)`;
  ctx.fillRect(0, H - FLOOR_MARGIN, W, 2);
  ctx.fillRect(0, FLOOR_MARGIN - 2, W, 2);
  ctx.restore();
}

function drawObstacles() {
  obstacles.forEach(o => {
    if (o.type === 'floor' || o.type === 'both') {
      drawSpike(o.x, H - FLOOR_MARGIN - o.h, SPIKE_W, o.h, false, bgHue);
    }
    if (o.type === 'ceil' || o.type === 'both') {
      const h2 = o.type === 'both' ? o.hc : o.h;
      drawSpike(o.x, FLOOR_MARGIN, SPIKE_W, h2, true, bgHue);
    }
    if (o.type === 'gap') {
      const sy = o.onCeil ? FLOOR_MARGIN : H - FLOOR_MARGIN - o.h;
      drawSpike(o.x, sy, SPIKE_W, o.h, o.onCeil, bgHue);
    }
  });
}

function drawSpike(x, y, w, h, fromTop, hue) {
  ctx.save();
  ctx.shadowBlur = 14;
  ctx.shadowColor = `hsl(${hue+160},100%,60%)`;

  const grad = ctx.createLinearGradient(x, y, x+w, y+h);
  grad.addColorStop(0, `hsl(${hue+160},100%,70%)`);
  grad.addColorStop(1, `hsl(${hue+160},80%,40%)`);
  ctx.fillStyle = grad;

  ctx.beginPath();
  if (fromTop) {
    ctx.moveTo(x, y);
    ctx.lineTo(x + w, y);
    ctx.lineTo(x + w/2, y + h);
  } else {
    ctx.moveTo(x + w/2, y);
    ctx.lineTo(x + w, y + h);
    ctx.lineTo(x, y + h);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawPlayer() {
  const cx = PLAYER_X + PLAYER_SIZE/2;
  const cy = playerY + PLAYER_SIZE/2;
  const r  = PLAYER_SIZE/2;

  ctx.save();
  ctx.translate(cx, cy);
  // Lean with gravity direction
  ctx.rotate(gravDir === 1 ? 0.15 : -0.15);

  // Engine trail
  const trailGrad = ctx.createLinearGradient(-r*2.5, 0, -r*0.5, 0);
  trailGrad.addColorStop(0, 'rgba(125,249,255,0)');
  trailGrad.addColorStop(1, 'rgba(125,249,255,0.5)');
  ctx.fillStyle = trailGrad;
  ctx.fillRect(-r*2.5, -r*0.35, r*2, r*0.7);

  // Body glow
  ctx.shadowBlur   = 20;
  ctx.shadowColor  = '#7DF9FF';

  // Ship body
  ctx.fillStyle = '#7DF9FF';
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(-r*0.6, -r*0.55);
  ctx.lineTo(-r*0.3, 0);
  ctx.lineTo(-r*0.6,  r*0.55);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.beginPath();
  ctx.ellipse(0, 0, r*0.4, r*0.3, 0, 0, Math.PI*2);
  ctx.fill();

  // Engine flame
  const flameH = (0.5 + Math.random()*0.5) * r;
  ctx.fillStyle = `hsl(${30 + Math.random()*30},100%,60%)`;
  ctx.shadowColor = '#FF8C00';
  ctx.beginPath();
  ctx.moveTo(-r*0.3, -r*0.35);
  ctx.lineTo(-r*0.3 - flameH, 0);
  ctx.lineTo(-r*0.3,  r*0.35);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 6; ctx.shadowColor = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

// ── Screens ──────────────────────────────────────────────────────────────────
function drawMenu(ts) {
  // Animated background
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#050a1a');
  grad.addColorStop(1, '#0a1428');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  starOffset += 0.4;  // slow drift on menu
  drawNebulae(ts);
  drawStars(ts);
  drawPlanets();

  // Title
  ctx.save();
  ctx.textAlign = 'center';

  ctx.shadowBlur = 40; ctx.shadowColor = '#7DF9FF';
  ctx.fillStyle = '#7DF9FF';
  ctx.font = `bold clamp(2rem,8vw,4rem)/1 Segoe UI`;
  ctx.font = `bold ${Math.min(W*0.1, 64)}px Segoe UI`;
  ctx.fillText('🚀 GRAVITY FLIP', W/2, H/2 - 80);

  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = `${Math.min(W*0.04, 22)}px Segoe UI`;
  ctx.fillText('RUNNER', W/2, H/2 - 40);

  // Pulse prompt
  const pulse = 0.7 + Math.sin(ts * 0.003) * 0.3;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = 'white';
  ctx.font = `bold ${Math.min(W*0.045, 26)}px Segoe UI`;
  ctx.fillText('PRESS SPACE  /  TAP  TO START', W/2, H/2 + 30);
  ctx.globalAlpha = 1;

  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = `${Math.min(W*0.033, 18)}px Segoe UI`;
  ctx.fillText('Avoid the spikes · Flip gravity to survive', W/2, H/2 + 75);

  ctx.restore();
}

function drawDeadOverlay(ts) {
  // Delay overlay appearance slightly to let death particles show
  if (!drawDeadOverlay.startTs) drawDeadOverlay.startTs = ts;
  if (ts - drawDeadOverlay.startTs < 300) return;

  // Overlay
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.textAlign = 'center';

  const isNew = Math.floor(score) >= best && best > 0;

  ctx.shadowBlur = 30; ctx.shadowColor = '#FF4444';
  ctx.fillStyle = '#FF6B6B';
  ctx.font = `bold ${Math.min(W*0.09, 56)}px Segoe UI`;
  ctx.fillText('GAME OVER', W/2, H/2 - 70);

  ctx.shadowBlur = 0;
  ctx.fillStyle = 'white';
  ctx.font = `bold ${Math.min(W*0.05, 30)}px Segoe UI`;
  ctx.fillText(`Score: ${Math.floor(score)}`, W/2, H/2 - 10);

  if (isNew) {
    ctx.fillStyle = '#FFD700';
    ctx.shadowBlur = 20; ctx.shadowColor = '#FFD700';
    ctx.font = `bold ${Math.min(W*0.04, 24)}px Segoe UI`;
    ctx.fillText('🏆 NEW BEST!', W/2, H/2 + 28);
    ctx.shadowBlur = 0;
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `${Math.min(W*0.035, 20)}px Segoe UI`;
    ctx.fillText(`Best: ${best}`, W/2, H/2 + 28);
  }

  const pulse = 0.7 + Math.sin(ts * 0.004) * 0.3;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#7DF9FF';
  ctx.font = `bold ${Math.min(W*0.04, 22)}px Segoe UI`;
  ctx.fillText('PRESS SPACE  /  TAP  TO RESTART', W/2, H/2 + 75);
  ctx.globalAlpha = 1;

  ctx.restore();
}

// ── Boot ──────────────────────────────────────────────────────────────────────
// Boot — single loop, started once
drawDeadOverlay.startTs = null;
requestAnimationFrame(tick);
</script>
</body>
